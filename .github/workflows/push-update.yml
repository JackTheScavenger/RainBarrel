name: Build and publish update

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - latest.json
      - README.md

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Read app version
        id: version
        shell: pwsh
        run: |
          $content = Get-Content -Raw -LiteralPath main.py
          if ($content -notmatch 'APP_VERSION\s*=\s*"([^"]+)"') {
            throw "APP_VERSION was not found in main.py"
          }
          $version = $Matches[1]
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Stamp update manifest URL into build
        shell: pwsh
        run: |
          $manifestUrl = "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/latest.json"
          $content = Get-Content -Raw -LiteralPath main.py
          $content = $content -replace 'UPDATE_MANIFEST_URL\s*=\s*"[^"]+"', "UPDATE_MANIFEST_URL = `"$manifestUrl`""
          Set-Content -LiteralPath main.py -Value $content -Encoding UTF8

      - name: Build executable
        run: pyinstaller main.spec

      - name: Hash executable
        id: hash
        shell: pwsh
        run: |
          $hash = (Get-FileHash -LiteralPath "dist\RainBarrel.exe" -Algorithm SHA256).Hash.ToLower()
          "sha256=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_NOTES: ${{ github.event.head_commit.message }}
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if (-not (git rev-parse $env:TAG 2>$null)) {
            git tag $env:TAG
            git push origin $env:TAG
          }

          if (gh release view $env:TAG 2>$null) {
            gh release upload $env:TAG "dist\RainBarrel.exe" --clobber
          } else {
            gh release create $env:TAG "dist\RainBarrel.exe" --title "RainBarrel $env:VERSION" --notes "$env:RELEASE_NOTES"
          }

      - name: Publish latest.json
        env:
          RELEASE_NOTES: ${{ github.event.head_commit.message }}
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/v$version/RainBarrel.exe"
          $manifest = [ordered]@{
            version = $version
            url = $downloadUrl
            sha256 = "${{ steps.hash.outputs.sha256 }}"
            notes = $env:RELEASE_NOTES
          }
          $manifest | ConvertTo-Json | Set-Content -LiteralPath latest.json -Encoding UTF8

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest.json
          if (-not (git diff --cached --quiet)) {
            git commit -m "Update release manifest for v$version [skip ci]"
            git pull --rebase origin "${{ github.ref_name }}"
            git push
          }
